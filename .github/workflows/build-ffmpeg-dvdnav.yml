name: Build FFmpeg (Windows with libdvdnav)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git make automake autoconf libtool \
            pkg-config yasm nasm texinfo wget \
            curl cmake ninja-build meson \
            libssl-dev

      - name: Clone build helpers
        run: |
          git clone https://github.com/rdp/ffmpeg-windows-build-helpers.git

      - name: Build FFmpeg with libdvdnav
        run: |
          cd ffmpeg-windows-build-helpers

          # Enable non-free + GPL + shared/static as needed
          export EXTRA_FFMPEG_CONF_FLAGS="\
            --enable-gpl \
            --enable-version3 \
            --enable-libdvdnav \
            --enable-libdvdread \
            --enable-libdvdcss \
          "

          # Build (64-bit Windows)
          ./cross_compile_ffmpeg.sh \
            --arch=x86_64 \
            --target-os=mingw32 \
            --enable-gpl \
            --enable-nonfree \
            --extra-ffmpeg-conf-flags="$EXTRA_FFMPEG_CONF_FLAGS"

      - name: Package artifacts
        run: |
          mkdir -p output
          cp -r ffmpeg-windows-build-helpers/sandbox/win64/ffmpeg_git_with_fdk_aac/* output/

          # Optional: shrink size
          tar -czvf ffmpeg-win64-dvdnav.tar.gz -C output .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-win64-dvdnav
          path: ffmpeg-win64-dvdnav.tar.gz
