name: Build FFmpeg Windows (with libdvdnav)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-ffmpeg:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential pkg-config autoconf automake \
            libtool wget curl bison flex yasm nasm meson cmake

      - name: Clone ffmpeg-windows-build-helpers
        run: |
          git clone https://github.com/rdp/ffmpeg-windows-build-helpers.git
          ls -R ffmpeg-windows-build-helpers

      - name: Build FFmpeg including libdvdnav
        env:
          # Add custom configure flags here:
          EXTRA_CONFIG_FLAGS: "--enable-libdvdnav --enable-libdvdread --enable-libdvdcss"
        run: |
          cd ffmpeg-windows-build-helpers

          # Run script non‑interactively, injecting extra configure options
          chmod +x cross_compile_ffmpeg.sh

          # The script will detect missing dependencies and build the cross‑toolchain
          # The env variable above is used in this workflow code to pass extra flags
          ./cross_compile_ffmpeg.sh \
            --build-ffmpeg-shared=y \
            --disable-nonfree=n \
            --extra-ffmpeg-config="$EXTRA_CONFIG_FLAGS"

      - name: Collect output
        run: |
          mkdir -p artifacts
          cp -r ffmpeg-windows-build-helpers/sandbox/win64/ffmpeg_git* artifacts/ || true
          # compress the whole folder if needed
          tar -czvf ffmpeg-win64-dvdnav.tar.gz -C artifacts .

      - name: Upload compile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-win64-dvdnav
          path: ffmpeg-win64-dvdnav.tar.gz
